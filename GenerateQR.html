<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสร้าง QR Code (หมดอายุทุก 1.30 นาที)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        h2 { color: #334155; margin-bottom: 20px; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #cbd5e1; font-size: 16px; margin-bottom: 20px; color: #1e293b; font-weight: bold; }
        #qrcode-container { display: flex; justify-content: center; align-items: center; margin: 20px 0; min-height: 250px; background-color: #f8fafc; border-radius: 15px; padding: 20px; border: 2px dashed #cbd5e1; }
        #qr-text { font-size: 12px; color: #64748b; margin-bottom: 15px; word-break: break-all; }
        button { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-start { background-color: #3b82f6; color: white; }
        .btn-stop { background-color: #ef4444; color: white; display: none; }
        .timer { font-size: 24px; color: #ef4444; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>⏱️ QR Code (อายุ 1.30 นาที)</h2>
        
        <select id="stationSelect" onchange="stationChanged()">
            <option value="QR_STN_01">ฐาน 1: Library Playground</option>
            <option value="QR_STN_02">ฐาน 2: Discovery Lab</option>
            <option value="QR_STN_03">ฐาน 3: Play Zone</option>
            <option value="QR_STN_04">ฐาน 4: Treasure Corner</option>
            <option value="QR_STN_05">ฐาน 5: Media Studio</option>
            <option value="QR_STN_06">ฐาน 6: Tech Station</option>
            <option value="QR_STN_07">ฐาน 7: Safety Checkpoint</option>
        </select>

        <div id="qrcode-container">
            <div id="qrcode"></div>
        </div>
        
        <div id="qr-text">กรุณากดเริ่มเพื่อสร้าง QR Code</div>
        
        <button id="btnStart" class="btn-start" onclick="startDynamicQR()">▶️ เริ่มสร้าง QR Code</button>
        <button id="btnStop" class="btn-stop" onclick="stopDynamicQR()">⏹️ หยุดการสร้าง QR</button>
        
        <div id="timerDisplay" class="timer">--:--</div>
    </div>

    <script>
        let qrCodeObj = null;
        let countdownId = null;
        const refreshRate = 90; // 90 วินาที (1 นาที 30 วินาที)
        let timeLeft = 0;

        function generateRandomQR() {
            const baseQR = document.getElementById('stationSelect').value;
            const currentTimestamp = Date.now();
            
            // นำรหัสฐานมาต่อด้วยเครื่องหมาย | และเวลาปัจจุบัน (มิลลิวินาที)
            const dynamicQRText = `${baseQR}|${currentTimestamp}`;

            document.getElementById('qr-text').innerText = `Data: ${baseQR} (อัปเดตล่าสุด)`;
            
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; 
            
            qrCodeObj = new QRCode(qrContainer, {
                text: dynamicQRText,
                width: 220,
                height: 220,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                generateRandomQR();
                timeLeft = refreshRate;
            }
            
            // แปลงวินาทีเป็นรูปแบบ นาที:วินาที (เช่น 01:30)
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timerDisplay').innerText = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            timeLeft--;
        }

        function startDynamicQR() {
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnStop').style.display = 'block';
            document.getElementById('stationSelect').disabled = true; 
            
            timeLeft = 0; // บังคับให้สร้างทันทีในรอบแรก
            updateTimer();
            countdownId = setInterval(updateTimer, 1000);
        }

        function stopDynamicQR() {
            document.getElementById('btnStart').style.display = 'block';
            document.getElementById('btnStop').style.display = 'none';
            document.getElementById('stationSelect').disabled = false; 
            
            clearInterval(countdownId);
            document.getElementById('timerDisplay').innerText = "--:--";
            document.getElementById("qrcode").innerHTML = "";
            document.getElementById('qr-text').innerText = "กรุณากดเริ่มเพื่อสร้าง QR Code";
        }

        function stationChanged() {
            stopDynamicQR();
        }
    </script>
</body>
</html>
