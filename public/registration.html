<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน | Chula Library Open House 2026</title>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="assets/css/registration.css?v=20260723-4">
</head>
<body>
    <main class="registration-card">
        <div class="language-switch" role="group" aria-label="Language">
            <button id="langTh" class="language-button active" type="button" lang="th" aria-pressed="true">ไทย</button>
            <button id="langEn" class="language-button" type="button" lang="en" aria-pressed="false">EN</button>
        </div>
        <p class="eyebrow">CHULA LIBRARY OPEN HOUSE 2026</p>
        <h1 id="pageTitle">รับรหัสสะสมแสตมป์</h1>
        <p id="pageIntro" class="intro">ลงทะเบียนหนึ่งครั้งเพื่อรับรหัส 6 หลักสำหรับเข้าใช้งาน Stamp Card</p>

        <div id="registrationTabs" class="tabs" role="tablist" aria-label="เมนูลงทะเบียน">
            <button class="tab active" id="registerTab" type="button" role="tab" aria-selected="true">ลงทะเบียน</button>
            <button class="tab" id="recoverTab" type="button" role="tab" aria-selected="false">ลืมรหัส</button>
        </div>

        <section id="registerPanel" role="tabpanel" aria-labelledby="registerTab">
            <form id="registerForm">
                <label id="studentIdLabel" for="studentId">รหัสนิสิต</label>
                <input id="studentId" name="studentId" type="text" inputmode="numeric" autocomplete="username" maxlength="10" pattern="[0-9]{10}" placeholder="กรอกรหัสนิสิต 10 หลัก" required>

                <fieldset class="choice-fieldset">
                    <legend id="visitedLegend">เคยมา Chula Library Open มั้ย</legend>
                    <div class="choice-options">
                        <input class="choice-input" id="visitedYes" name="visitedOpenHouse" type="radio" value="yes" required>
                        <label id="visitedYesLabel" class="choice-button" for="visitedYes">เคย</label>
                        <input class="choice-input" id="visitedNo" name="visitedOpenHouse" type="radio" value="no">
                        <label id="visitedNoLabel" class="choice-button" for="visitedNo">ไม่เคย</label>
                    </div>
                </fieldset>

                <button id="registerSubmit" class="primary-button" type="submit">ยืนยันการลงทะเบียน</button>
            </form>
        </section>

        <section id="recoverPanel" class="hidden" role="tabpanel" aria-labelledby="recoverTab">
            <form id="recoverForm">
                <label id="recoverStudentIdLabel" for="recoverStudentId">รหัสนิสิต</label>
                <input id="recoverStudentId" name="studentId" type="text" inputmode="numeric" autocomplete="username" maxlength="10" pattern="[0-9]{10}" placeholder="กรอกรหัสนิสิต 10 หลัก" required>
                <button id="recoverSubmit" class="primary-button" type="submit">ค้นหารหัสของฉัน</button>
            </form>
        </section>

        <section id="resultPanel" class="result hidden" aria-live="polite">
            <p id="resultMessage"></p>
            <strong id="accessCode" class="access-code"></strong>
            <a id="openStampLink" class="primary-button link-button" href="Stamp.html">ไปหน้า Stamp Card</a>
        </section>

        <p id="formStatus" class="status" role="status" aria-live="polite"></p>
        <a id="backToStampLink" class="back-link" href="Stamp.html">มีรหัสแล้ว? เข้าสู่ Stamp Card</a>
    </main>

    <script defer src="assets/js/config/app-config.js"></script>
    <script defer src="assets/js/config/firebase-config.js"></script>
    <script defer src="assets/js/shared/firebase-service.js?v=20260723-5"></script>
    <script defer src="assets/js/pages/registration.js?v=20260723-4"></script>
</body>
</html>
