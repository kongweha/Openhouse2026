<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสร้าง QR Code (หมดอายุทุก 1.30 นาที)</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="assets/css/generate-qr.css">
</head>
<body>

    <div class="container">
        <h2>⏱️ QR Code (อายุ 1.30 นาที)</h2>
        
        <select id="stationSelect" onchange="stationChanged()"></select>

        <div id="qrcode-container">
            <div id="qrcode"></div>
        </div>
        
        <div id="qr-text">กรุณากดเริ่มเพื่อสร้าง QR Code</div>
        
        <button id="btnStart" class="btn-start" onclick="startDynamicQR()">▶️ เริ่มสร้าง QR Code</button>
        <button id="btnStop" class="btn-stop" onclick="stopDynamicQR()">⏹️ หยุดการสร้าง QR</button>
        
        <div id="timerDisplay" class="timer">--:--</div>
    </div>
    <script defer src="assets/js/config/app-config.js?v=20260724-1"></script>
    <script defer src="assets/js/pages/generate-qr.js?v=20260723-4"></script>
</body>
</html>
